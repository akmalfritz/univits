<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Sepatu Pantofel - UnivFits</title>

</head>
<body class="bg-stone-50">

<div class="max-w-7xl mx-auto px-6 py-10">

    <div class="grid lg:grid-cols-2 gap-12">

        <!-- Gallery -->
        <div>

            <img
                src="https://images.unsplash.com/photo-1542291026-7eec264c27ff"
                class="rounded-3xl w-full">

            <div class="grid grid-cols-4 gap-4 mt-4">

                <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff"
                     class="rounded-xl cursor-pointer">

                <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff"
                     class="rounded-xl cursor-pointer">

                <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff"
                     class="rounded-xl cursor-pointer">

                <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff"
                     class="rounded-xl cursor-pointer">

            </div>

        </div>

        <!-- Product Info -->
        <div>

            <h1 class="text-4xl font-bold">
                Sepatu Pantofel Formal
            </h1>

            <div class="flex gap-3 mt-4">
                <span class="text-yellow-500">
                    ★★★★★
                </span>

                <span class="text-gray-500">
                    4.9 (124 Ulasan)
                </span>
            </div>

            <p class="text-4xl font-bold text-orange-500 mt-6">

                Cocok untuk PKKMB, seminar,
                presentasi, sidang, dan acara formal kampus.
            </p>

            <div class="mt-8">

                    Ukuran
                </h3>

                <div class="flex gap-3">

                    <button class="border px-4 py-2 rounded-xl">
                        39
                    </button>

                    <button class="border px-4 py-2 rounded-xl">
                        40
                    </button>

                    <button class="border px-4 py-2 rounded-xl">
                        41
                    </button>

                    <button class="border px-4 py-2 rounded-xl">
                        42
                    </button>

                </div>

            </div>

            <div class="flex gap-4 mt-8">

                <button
                    class="flex-1 border border-black py-4 rounded-2xl">
                    Tambah Keranjang
                </button>

                <button
                    class="flex-1 bg-black text-white py-4 rounded-2xl">
                    Beli Sekarang
                </button>

            </div>

        </div>

    </div>

</div>

</body>
</html>
